<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Style/style02.css">

    <title>Crie sua Conta</title>
    <link rel="icon" type="image aba" href="../Imagens/Logo Aba.png">
</head>
<body>
   <header>
    <div class="logo-container">
        <img src="../Imagens/Logo.png" alt="Logo Dev Make" class="logo">
    </div>


        <nav class="menu-principal">
    <ul>
        <li><a href="Index.html">Volte ao Início</a></li>
    </ul>
</nav>
    </header>

<section class="registro-container">
    <div class="perfil-card">
        <h4>Crie seu Perfil</h4>
        <p>Junte-se para mais dicas de beleza e ganhe mimos exclusivos.</p>
        
        <form class="perfil-form">
            <div class="input-group">
                <label>Nome</label>
                <input type="text" placeholder="Nome Completo">
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" placeholder="email@exemplo.com">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="no mínimo 8 dígitos">
            </div>

            <button type="submit" class="btn-registro">Criar minha conta</button>
        </form>
    </div>
</section>

 <footer>
    <div class="footer-bottom">
        <p>&copy; 2026 Dev Make up - Todos os direitos reservados.</p>
    </div>
</footer>

</body>
</html>
